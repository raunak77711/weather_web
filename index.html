<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App - Raunak Sharma</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ededed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
    }

    .header p {
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Search ── */
    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .search-input {
      flex: 1;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 0 1rem;
      height: 46px;
      font-size: 0.95rem;
      color: #ededed;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: #555; }
    .search-input:focus { border-color: #444; }

    .search-btn {
      height: 46px;
      padding: 0 1.25rem;
      background: #ededed;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-btn:hover { background: #d4d4d4; }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.5; pointer-events: none; }

    /* ── Error ── */
    .error-msg {
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: #cc4444;
      display: none;
      margin-bottom: 1rem;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    /* ── Weather Card ── */
    .card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 1.75rem;
      display: none;
      animation: fadeUp 0.35s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card.visible { display: block; }

    .city-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .city-name {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ededed;
      line-height: 1.2;
    }

    .country-badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.7rem;
      color: #555;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 2px 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .weather-emoji {
      font-size: 2.75rem;
      line-height: 1;
    }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-bottom: 0.35rem;
    }

    .temp-main {
      font-size: 4.5rem;
      font-weight: 700;
      color: #ededed;
      letter-spacing: -3px;
      line-height: 1;
    }

    .temp-unit {
      font-size: 1.5rem;
      color: #555;
      font-weight: 400;
    }

    .desc-text {
      font-size: 0.95rem;
      color: #666;
      text-transform: capitalize;
      margin-bottom: 1.75rem;
    }

    .divider {
      height: 1px;
      background: #1e1e1e;
      margin-bottom: 1.5rem;
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: #161616;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #d4d4d4;
    }

    .feels-like {
      font-size: 0.8rem;
      color: #444;
      text-align: center;
      margin-top: 0.5rem;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: #2e2e2e;
      letter-spacing: 0.04em;
    }

    .footer span { color: #444; }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .temp-main { font-size: 3.5rem; }
      .city-name  { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Weather</h1>
    <p>Real-time forecast</p>
  </div>

  <div class="search-wrap">
    <input
      id="cityInput"
      class="search-input"
      type="text"
      placeholder="Enter city name..."
      autocomplete="off"
    />
    <button class="search-btn" id="searchBtn" onclick="fetchWeather()">
      Search
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="card" id="weatherCard">
    <div class="city-row">
      <div>
        <div class="city-name" id="cityName">—</div>
        <div class="country-badge" id="countryBadge">—</div>
      </div>
      <div class="weather-emoji" id="weatherEmoji">☁️</div>
    </div>

    <div class="temp-row">
      <div class="temp-main" id="tempMain">—</div>
      <div class="temp-unit">°C</div>
    </div>
    <div class="desc-text" id="descText">—</div>

    <div class="divider"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Wind Speed</div>
        <div class="stat-value" id="wind">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="visibility">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="pressure">—</div>
      </div>
    </div>

    <div class="feels-like" id="feelsLike">Feels like —</div>
  </div>

</div>

<div class="footer">
  Made by <span>Raunak Sharma</span> &nbsp;·&nbsp; Powered by OpenWeather
</div>

<script>
  
  const API_KEY = 'b7b2e8c81209037e9d63ec12534f0878';

  const weatherEmojis = {
    Clear:        '☀️',
    Clouds:       '☁️',
    Rain:         '🌧️',
    Drizzle:      '🌦️',
    Thunderstorm: '⛈️',
    Snow:         '❄️',
    Mist:         '🌫️',
    Fog:          '🌫️',
    Haze:         '🌫️',
    Smoke:        '🌫️',
    Dust:         '🌫️',
    Sand:         '🌫️',
    Ash:          '🌫️',
    Squall:       '💨',
    Tornado:      '🌪️',
  };

  // Allow pressing Enter to search
  document.getElementById('cityInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchWeather();
  });

  async function fetchWeather() {
    const city     = document.getElementById('cityInput').value.trim();
    const btn      = document.getElementById('searchBtn');
    const errorEl  = document.getElementById('errorMsg');
    const card     = document.getElementById('weatherCard');

    if (!city) return;

    // Reset UI
    btn.disabled = true;
    btn.textContent = 'Loading…';
    errorEl.classList.remove('visible');
    card.classList.remove('visible');

    try {
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
      const res  = await fetch(url);
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'City not found');

      // Populate card
      document.getElementById('cityName').textContent   = data.name;
      document.getElementById('countryBadge').textContent = data.sys.country;
      document.getElementById('tempMain').textContent   = Math.round(data.main.temp);
      document.getElementById('descText').textContent   = data.weather[0].description;
      document.getElementById('humidity').textContent   = data.main.humidity + '%';
      document.getElementById('wind').textContent       = Math.round(data.wind.speed * 3.6) + ' km/h';
      document.getElementById('visibility').textContent = (data.visibility / 1000).toFixed(1) + ' km';
      document.getElementById('pressure').textContent   = data.main.pressure + ' hPa';
      document.getElementById('feelsLike').textContent  = `Feels like ${Math.round(data.main.feels_like)}°C`;
      document.getElementById('weatherEmoji').textContent = weatherEmojis[data.weather[0].main] || '🌡️';

      card.classList.add('visible');

    } catch (err) {
      const msg = err.message.charAt(0).toUpperCase() + err.message.slice(1);
      errorEl.textContent = '⚠️ ' + msg;
      errorEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }
</script>

</body>
</html>
